<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker | Healora</title>

    <link rel="stylesheet" href="../css/health-tracker.css">
</head>

<body>

    <div class="container">

        <h1>❤️ Health Tracker</h1>

        <p class="subtitle">
            Monitor your health statistics in one place.
        </p>

        <div class="health-grid">

            <div class="card">
                <h2>❤️ Heart Rate</h2>
                <p id="heartRate">-- BPM</p>
            </div>

            <div class="card">
                <h2>🩸 Blood Pressure</h2>
                <p id="bloodPressure">-- / --</p>
            </div>

            <div class="card">
                <h2>😴 Sleep</h2>
                <p id="sleep">-- hrs</p>
            </div>

            <div class="card">
                <h2>👣 Steps</h2>
                <p id="steps">--</p>
            </div>

            <div class="card">
                <h2>💚 Health Score</h2>
                <p id="healthScore">--%</p>
            </div>

        </div>

        <div class="message">
            <p id="status">
                Loading your health data...
            </p>
        </div>

        <br>

        <a href="chatbot.html">
            ← Back to AI Assistant
        </a>

    </div>

    <script src="../js/health-tracker.js"></script>

</body>

</html>
