<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healora | Forgot Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/auth.css">

</head>

<body>

<div class="auth-background">

<div class="blob blob-one"></div>

<div class="blob blob-two"></div>

<div class="blob blob-three"></div>

</div>

<main class="auth-container">

<section class="auth-brand">

<a href="../index.html" class="auth-logo">

<span class="logo-icon">❤️</span>

Healora

</a>

<div class="brand-content">

<h1>

Reset Your
<br>
Password

</h1>

<p>

Don't worry! Enter your registered email address and we'll send you a secure One-Time Password (OTP).

</p>

<div class="health-orb">

<div class="orb-ring"></div>

<div class="orb-core">

🔐

</div>

</div>

<div class="floating-health-card card-one">

📧

<span>

OTP Verification

<strong>Secure</strong>

</span>

</div>

<div class="floating-health-card card-two">

🛡️

<span>

Account Security

<strong>Protected</strong>

</span>

</div>

</div>

</section>

<section class="auth-card">

<div class="card-header">

<h2>Forgot Password</h2>

<p>

Enter your registered email address.

</p>

</div>

<form id="forgotPasswordForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<span>📧</span>

<input

type="email"

id="forgotEmail"

placeholder="Enter your registered email"

required>

</div>

</div>

<div id="forgotMessage" class="form-message"></div>

<button

type="submit"

class="auth-btn">

<span>

Send OTP

</span>

</button>

<p class="switch-page">

Remember your password?

<a href="login.html">

Login

</a>

</p>

</form>

</section>

</main>

<script src="../js/auth.js"></script>

</body>

</html>
